<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pantheon</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22253a;
    --border: #2a2d3e;
    --accent: #4a90e2;
    --accent2: #7c5cbf;
    --text: #e0e0e0;
    --muted: #7a7f9a;
    --green: #4caf76;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  /* Nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 56px; }
  nav .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.05em; margin-right: 12px; }
  nav button { background: none; border: none; color: var(--muted); font-size: 0.9rem; cursor: pointer; padding: 6px 14px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
  nav button.active, nav button:hover { color: var(--text); background: var(--surface2); }
  nav .spacer { flex: 1; }
  nav .sync-btn { background: var(--accent); color: #fff; border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s; }
  nav .sync-btn:disabled { opacity: 0.5; cursor: default; }
  nav .sync-status { font-size: 0.8rem; color: var(--muted); }

  /* Tabs */
  .tab { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
  .tab.active { display: block; }

  /* Summary */
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; }
  .stat-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .platform-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .platform-table table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .platform-table th { background: var(--surface2); text-align: left; padding: 10px 16px; color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .platform-table td { padding: 12px 16px; border-top: 1px solid var(--border); }
  .pct-bar-sm { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; }
  .pct-bar-sm .fill { height: 100%; background: var(--accent); border-radius: 2px; }

  /* Library controls */
  .controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .controls input[type=text] { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 6px; font-size: 0.9rem; width: 240px; outline: none; }
  .controls input[type=text]:focus { border-color: var(--accent); }
  .controls select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; outline: none; cursor: pointer; }
  .controls .count { margin-left: auto; color: var(--muted); font-size: 0.85rem; }

  /* Game grid */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(560px, 1fr)); gap: 12px; }

  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .game-card:hover { border-color: var(--accent); }
  .game-card.expanded { border-color: var(--accent2); }

  .game-card-header { display: flex; gap: 0; position: relative; }
  .game-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.12; filter: blur(2px); pointer-events: none; }
  .game-card-content { display: flex; align-items: center; gap: 16px; padding: 16px; position: relative; z-index: 1; width: 100%; }
  .game-icon { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--surface2); }
  .game-icon-placeholder { width: 80px; height: 80px; border-radius: 6px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.6rem; }
  .game-info { flex: 1; min-width: 0; }
  .game-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .game-meta { display: flex; gap: 16px; font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; flex-wrap: wrap; }
  .game-meta span { display: flex; align-items: center; gap: 4px; }
  .pct-bar { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 6px; }
  .pct-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s; }
  .pct-label { font-size: 0.75rem; color: var(--muted); }
  .platform-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .platform-badge img { width: 12px; height: 12px; }

  /* Achievement panel */
  .ach-panel { border-top: 1px solid var(--border); padding: 16px; display: none; }
  .game-card.expanded .ach-panel { display: block; }
  .ach-panel .loading { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 12px; }
  .ach-list { display: flex; flex-direction: column; gap: 2px; max-height: 320px; overflow-y: auto; }
  .ach-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; }
  .ach-row:hover { background: var(--surface2); }
  .ach-row.locked { opacity: 0.45; }
  .ach-icon { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .ach-icon-placeholder { width: 36px; height: 36px; border-radius: 4px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--muted); }
  .ach-text { flex: 1; min-width: 0; }
  .ach-name { font-size: 0.85rem; font-weight: 600; }
  .ach-desc { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ach-meta { text-align: right; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
  .ach-date { font-size: 0.7rem; color: var(--green); }
  .ach-rarity { font-size: 0.7rem; }

  /* Status tab */
  .status-section { margin-bottom: 24px; }
  .status-section h2 { font-size: 1rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .run-list { display: flex; flex-direction: column; gap: 8px; }
  .run-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; gap: 16px; align-items: center; font-size: 0.85rem; }
  .run-row .run-status { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
  .run-row .run-status.ok { background: #1e4d2e; color: #4caf76; }
  .run-row .run-status.error { background: #4d1e1e; color: #f44; }
  .run-row .run-status.running { background: #1e3a4d; color: #4a90e2; }
  .run-row .run-detail { color: var(--muted); flex: 1; }
  .account-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .account-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .account-card .platform { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .account-card .name { font-weight: 600; }
  .account-card .synced { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Pagination */
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
  .pagination button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 0.95rem; }

  @media (max-width: 640px) {
    .game-grid { grid-template-columns: 1fr; }
    .controls input[type=text] { width: 100%; }
  }
</style>
</head>
<body>

<nav>
  <span class="logo">⚡ Pantheon</span>
  <button class="active" onclick="showTab('library')">Library</button>
  <button onclick="showTab('summary')">Summary</button>
  <button onclick="showTab('status')">Status</button>
  <span class="spacer"></span>
  <span class="sync-status" id="syncStatus"></span>
  <button class="sync-btn" id="syncBtn" onclick="triggerSync()">Sync now</button>
</nav>

<div class="tab active" id="tab-library">
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search games…" oninput="onSearch()">
    <select id="sortSelect" onchange="loadGames(1)">
      <option value="recent">Recently played</option>
      <option value="completion">Completion %</option>
      <option value="playtime">Playtime</option>
      <option value="name">Name</option>
    </select>
    <select id="platformSelect" onchange="loadGames(1)">
      <option value="">All platforms</option>
      <option value="steam">Steam</option>
      <option value="retroachievements">RetroAchievements</option>
    </select>
    <span class="count" id="gameCount"></span>
  </div>
  <div class="game-grid" id="gameGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="tab" id="tab-summary">
  <div class="stat-cards" id="statCards"></div>
  <div class="platform-table" id="platformTable"></div>
</div>

<div class="tab" id="tab-status">
  <div class="status-section">
    <h2>Linked Accounts</h2>
    <div class="account-cards" id="accountCards"></div>
  </div>
  <div class="status-section">
    <h2>Recent Sync Runs</h2>
    <div class="run-list" id="runList"></div>
  </div>
</div>

<script>
let currentPage = 1;
let searchTimer = null;
let expandedAchievements = {};

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'summary') loadSummary();
  if (name === 'status') loadStatus();
}

function fmt(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function fmtTime(minutes) {
  if (!minutes) return '0m';
  if (minutes < 60) return minutes + 'm';
  const h = Math.floor(minutes / 60), m = minutes % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

function platformIcon(platform) {
  if (platform === 'steam') return `<img src="https://store.steampowered.com/favicon.ico" alt="">`;
  if (platform === 'retroachievements') return `🏆`;
  return '';
}

function platformLabel(platform) {
  if (platform === 'steam') return 'Steam';
  if (platform === 'retroachievements') return 'RetroAchievements';
  return platform;
}

// ── Library ──────────────────────────────────────────────────────────────────

async function loadGames(page = 1) {
  currentPage = page;
  const sort = document.getElementById('sortSelect').value;
  const platform = document.getElementById('platformSelect').value;
  const search = document.getElementById('searchInput').value.trim();

  let url = `/api/games?sort=${sort}&page=${page}&page_size=20`;
  if (platform) url += `&platform=${encodeURIComponent(platform)}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById('gameCount').textContent = `${data.total} games`;
  renderGames(data.games);
  renderPagination(data.total, page, 20);
}

function renderGames(games) {
  const grid = document.getElementById('gameGrid');
  if (!games.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No games found.</div>';
    return;
  }
  grid.innerHTML = games.map(g => gameCardHTML(g)).join('');
}

function gameCardHTML(g) {
  const pct = parseFloat(g.completion_pct) || 0;
  const bgStyle = g.icon_url ? `style="background-image:url('${g.icon_url}')"` : '';
  const icon = g.icon_url
    ? `<img class="game-icon" src="${g.icon_url}" alt="" onerror="this.style.display='none'">`
    : `<div class="game-icon-placeholder">🎮</div>`;

  return `
  <div class="game-card" id="card-${g.platform_game_id}" onclick="toggleAchievements(${g.platform_game_id}, this)">
    <div class="game-card-header">
      <div class="game-card-bg" ${bgStyle}></div>
      <div class="game-card-content">
        ${icon}
        <div class="game-info">
          <div class="game-name" title="${g.name}">${escHtml(g.name)}</div>
          <div class="game-meta">
            <span>🏆 ${g.earned_achievements} / ${g.total_achievements}</span>
            <span>⏱ ${fmtTime(g.playtime_minutes)}</span>
            <span>📅 ${fmt(g.last_played_at)}</span>
          </div>
          <div class="pct-bar"><div class="fill" style="width:${pct}%"></div></div>
          <div class="pct-label">${pct}%</div>
          <div class="platform-badge">${platformIcon(g.platform)} ${platformLabel(g.platform)}</div>
        </div>
      </div>
    </div>
    <div class="ach-panel" id="ach-${g.platform_game_id}">
      <div class="loading">Loading achievements…</div>
    </div>
  </div>`;
}

async function toggleAchievements(id, cardEl) {
  const panel = document.getElementById('ach-' + id);
  const isExpanded = cardEl.classList.toggle('expanded');

  if (!isExpanded) return;

  if (expandedAchievements[id]) {
    panel.innerHTML = expandedAchievements[id];
    return;
  }

  const res = await fetch(`/api/games/${id}/achievements`);
  const achs = await res.json();
  const html = achs.length
    ? `<div class="ach-list">${achs.map(achRowHTML).join('')}</div>`
    : `<div class="loading">No achievement data.</div>`;
  expandedAchievements[id] = html;
  panel.innerHTML = html;
}

function achRowHTML(a) {
  const locked = !a.unlocked;
  const icon = a.icon_url
    ? `<img class="ach-icon" src="${a.icon_url}" alt="" onerror="this.style.display='none'">`
    : `<div class="ach-icon-placeholder">🏅</div>`;
  const rarity = a.rarity_pct != null ? `<div class="ach-rarity">${parseFloat(a.rarity_pct).toFixed(1)}% unlock rate</div>` : '';
  const date = a.unlocked_at ? `<div class="ach-date">${fmt(a.unlocked_at)}</div>` : '';
  return `
  <div class="ach-row ${locked ? 'locked' : ''}">
    ${icon}
    <div class="ach-text">
      <div class="ach-name">${escHtml(a.name || a.platform_ach_id)}</div>
      <div class="ach-desc">${escHtml(a.description || '')}</div>
    </div>
    <div class="ach-meta">${date}${rarity}</div>
  </div>`;
}

function renderPagination(total, page, pageSize) {
  const pages = Math.ceil(total / pageSize);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = `<button onclick="loadGames(${page - 1})" ${page === 1 ? 'disabled' : ''}>←</button>`;
  const start = Math.max(1, page - 2), end = Math.min(pages, page + 2);
  for (let p = start; p <= end; p++) {
    html += `<button class="${p === page ? 'active' : ''}" onclick="loadGames(${p})">${p}</button>`;
  }
  html += `<button onclick="loadGames(${page + 1})" ${page === pages ? 'disabled' : ''}>→</button>`;
  el.innerHTML = html;
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadGames(1), 300);
}

// ── Summary ───────────────────────────────────────────────────────────────────

async function loadSummary() {
  const res = await fetch('/api/summary');
  const d = await res.json();

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card">
      <div class="label">Total Games</div>
      <div class="value">${d.total_games}</div>
    </div>
    <div class="stat-card">
      <div class="label">Achievements</div>
      <div class="value">${d.total_earned.toLocaleString()}</div>
      <div class="sub">of ${d.total_possible.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="label">Overall Completion</div>
      <div class="value">${d.overall_pct}%</div>
    </div>`;

  document.getElementById('platformTable').innerHTML = `
    <table>
      <thead><tr><th>Platform</th><th>Games</th><th>Earned</th><th>Total</th><th>Completion</th></tr></thead>
      <tbody>${d.by_platform.map(p => `
        <tr>
          <td>${platformLabel(p.platform)}</td>
          <td>${p.games}</td>
          <td>${(p.earned || 0).toLocaleString()}</td>
          <td>${(p.possible || 0).toLocaleString()}</td>
          <td>
            ${p.pct}%
            <div class="pct-bar-sm"><div class="fill" style="width:${p.pct}%"></div></div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Status ────────────────────────────────────────────────────────────────────

async function loadStatus() {
  const res = await fetch('/api/status');
  const d = await res.json();

  document.getElementById('syncStatus').textContent = d.syncing ? '⟳ Syncing…' : '';
  document.getElementById('syncBtn').disabled = d.syncing;

  document.getElementById('accountCards').innerHTML = d.accounts.map(a => `
    <div class="account-card">
      <div class="platform">${platformLabel(a.platform)}</div>
      <div class="name">${escHtml(a.display_name || a.external_id)}</div>
      <div class="synced">Last synced: ${fmt(a.last_synced_at)}</div>
    </div>`).join('');

  document.getElementById('runList').innerHTML = d.recent_runs.map(r => `
    <div class="run-row">
      <span class="run-status ${r.status}">${r.status}</span>
      <span>${platformLabel(r.platform)}</span>
      <span>${fmt(r.started_at)}</span>
      <span class="run-detail">${escHtml(r.detail || '')}</span>
    </div>`).join('') || '<div class="empty">No sync runs yet.</div>';
}

// ── Sync ──────────────────────────────────────────────────────────────────────

async function triggerSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  document.getElementById('syncStatus').textContent = '⟳ Syncing…';
  try {
    await fetch('/api/sync', { method: 'POST' });
  } catch (_) {}
}

// ── Util ──────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
loadGames(1);
</script>
</body>
</html>
