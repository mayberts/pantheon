<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pantheon // Hall of Records</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #090c13;
    --bg2:      #0d1120;
    --surface:  #111827;
    --border:   #1e2a3a;
    --border2:  #253045;
    --cyan:     #00d4e8;
    --cyan-dim: #00a8b8;
    --amber:    #f0a020;
    --text:     #e8eaf0;
    --muted:    #4a5c72;
    --muted2:   #6b7f99;
    --green:    #00e87a;
    --red:      #e83c3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── Header ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { line-height: 1; }
  .brand-sub {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .brand-title {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .sync-label { font-size: 0.75rem; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; }

  .btn-sync {
    background: var(--cyan);
    color: #000;
    border: none;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-sync:hover { background: #00eeff; }
  .btn-sync:disabled { background: var(--muted); cursor: default; }

  /* ── Main layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 28px 32px 60px; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted2);
    font-weight: 600;
    white-space: nowrap;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Stats bar ── */
  .stats-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 48px;
    flex-wrap: wrap;
  }
  .stat-main .val {
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--cyan);
    line-height: 1;
    font-family: 'Share Tech Mono', monospace;
  }
  .stat-main .val span { font-size: 1.4rem; }
  .stat-main .lbl {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-top: 4px;
  }
  .stat-divider { width: 1px; height: 48px; background: var(--border2); }
  .stat .val {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
  }
  .stat.amber .val { color: var(--amber); }
  .stat .lbl {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-top: 2px;
  }

  /* ── Platforms ── */
  .platforms-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .platform-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 14px 20px;
    min-width: 180px;
  }
  .platform-card .p-name {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cyan);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .platform-card .p-stats { display: flex; gap: 20px; }
  .platform-card .p-stat .val { font-size: 1.1rem; font-weight: 700; }
  .platform-card .p-stat .lbl { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); }
  .p-bar { height: 2px; background: var(--border2); margin-top: 10px; }
  .p-bar .fill { height: 100%; background: var(--cyan-dim); }

  /* ── Library controls ── */
  .library-controls { display: flex; align-items: center; gap: 0; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .sort-tabs { display: flex; border: 1px solid var(--border); }
  .sort-tab {
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted2);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .sort-tab:last-child { border-right: none; }
  .sort-tab.active { background: var(--cyan); color: #000; }
  .sort-tab:not(.active):hover { background: var(--surface); color: var(--text); }

  .search-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 7px 14px;
    outline: none;
    width: 220px;
    letter-spacing: 0.04em;
  }
  .search-box:focus { border-color: var(--cyan-dim); }
  .search-box::placeholder { color: var(--muted); }

  .plat-filter {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
  }

  .lib-count { margin-left: auto; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); }

  /* ── Game grid ── */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 2px; }

  .game-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.12s;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--border2);
    transition: background 0.12s;
  }
  .game-card:hover { border-color: var(--border2); }
  .game-card:hover::before { background: var(--cyan-dim); }
  .game-card.expanded::before { background: var(--cyan); }
  .game-card.expanded { border-color: var(--cyan-dim); }

  .game-card-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.07;
    pointer-events: none;
  }

  .game-card-body {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px 14px 18px;
    position: relative;
    z-index: 1;
  }

  .game-icon {
    width: 72px; height: 72px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .game-icon-placeholder {
    width: 72px; height: 72px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 1.4rem;
  }

  .game-info { flex: 1; min-width: 0; }
  .game-name {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }
  .game-meta {
    display: flex;
    gap: 18px;
    font-size: 0.72rem;
    color: var(--muted2);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .game-meta span { display: flex; align-items: center; gap: 5px; }
  .game-meta .ico { color: var(--cyan-dim); font-size: 0.65rem; }

  .pct-track { height: 3px; background: var(--border2); margin-bottom: 4px; }
  .pct-fill { height: 100%; background: var(--cyan-dim); transition: width 0.3s; }
  .pct-fill.full { background: var(--cyan); }

  .game-footer { display: flex; align-items: center; justify-content: space-between; }
  .pct-val { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted2); }
  .pct-val.full { color: var(--cyan); }

  .plat-tag {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 1px 6px;
  }

  /* ── Achievement panel ── */
  .ach-panel {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 18px;
    position: relative;
    z-index: 1;
  }
  .game-card.expanded .ach-panel { display: block; }

  .ach-list { display: flex; flex-direction: column; max-height: 300px; overflow-y: auto; }
  .ach-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 6px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .ach-row:last-child { border-bottom: none; }
  .ach-row:hover { background: var(--surface); }
  .ach-row.locked { opacity: 0.35; }

  .ach-icon { width: 32px; height: 32px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .ach-icon-ph { width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.9rem; }
  .ach-text { flex: 1; min-width: 0; }
  .ach-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ach-desc { font-size: 0.68rem; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .ach-right { text-align: right; flex-shrink: 0; }
  .ach-date { font-size: 0.65rem; color: var(--green); letter-spacing: 0.05em; }
  .ach-rarity { font-size: 0.62rem; color: var(--muted2); margin-top: 1px; }

  .ach-loading { font-size: 0.72rem; color: var(--muted2); text-align: center; padding: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── Empty / pagination ── */
  .empty-state {
    background: var(--bg2);
    border: 1px dashed var(--border2);
    padding: 40px;
    text-align: center;
    color: var(--muted2);
    font-size: 0.82rem;
    letter-spacing: 0.1em;
  }

  .pagination { display: flex; justify-content: center; gap: 2px; margin-top: 20px; }
  .pagination button {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--muted2);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    cursor: pointer;
  }
  .pagination button.active { background: var(--cyan); border-color: var(--cyan); color: #000; }
  .pagination button:disabled { opacity: 0.3; cursor: default; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 20px 16px 40px; }
    .game-grid { grid-template-columns: 1fr; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-sub">Pantheon // Hall of Records</div>
    <div class="brand-title">Cross-Platform Achievements</div>
  </div>
  <div class="header-right">
    <span class="sync-label" id="syncLabel">Ready</span>
    <button class="btn-sync" id="syncBtn" onclick="triggerSync()">Sync Now</button>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="section-header" style="margin-top:0">
    <div class="section-line"></div>
  </div>
  <div class="stats-bar" id="statsBar">
    <div class="stat-main">
      <div class="val" id="s-pct">0<span>%</span></div>
      <div class="lbl">Total Completion</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="val" id="s-games">0</div>
      <div class="lbl">Games Tracked</div>
    </div>
    <div class="stat">
      <div class="val" id="s-earned">0</div>
      <div class="lbl">Unlocked</div>
    </div>
    <div class="stat">
      <div class="val" id="s-total">0</div>
      <div class="lbl">Available</div>
    </div>
    <div class="stat amber" id="s-perfect-wrap">
      <div class="val" id="s-perfect">0</div>
      <div class="lbl">Completed 100%</div>
    </div>
  </div>

  <!-- Platforms -->
  <div class="section-header">
    <div class="section-label">Platforms</div>
    <div class="section-line"></div>
  </div>
  <div class="platforms-grid" id="platformsGrid">
    <div class="empty-state" style="width:100%">Loading record…</div>
  </div>

  <!-- Library -->
  <div class="section-header">
    <div class="section-label">Library</div>
    <div class="section-line"></div>
  </div>

  <div class="library-controls">
    <div class="sort-tabs">
      <button class="sort-tab active" data-sort="completion" onclick="setSort(this)">Completion</button>
      <button class="sort-tab" data-sort="recent" onclick="setSort(this)">Recent</button>
      <button class="sort-tab" data-sort="playtime" onclick="setSort(this)">Playtime</button>
      <button class="sort-tab" data-sort="name" onclick="setSort(this)">Name</button>
    </div>
    <input class="search-box" type="text" id="searchInput" placeholder="Search games…" oninput="onSearch()">
    <select class="plat-filter" id="platFilter" onchange="loadGames(1)">
      <option value="">All Platforms</option>
      <option value="steam">Steam</option>
      <option value="retroachievements">RetroAchievements</option>
    </select>
    <span class="lib-count" id="libCount"></span>
  </div>

  <div class="game-grid" id="gameGrid"></div>
  <div class="pagination" id="pagination"></div>

</main>

<script>
let currentSort = 'completion';
let searchTimer = null;
let achCache = {};

// ── Init ─────────────────────────────────────────────────────────────────────

loadSummary();
loadGames(1);

// ── Summary ───────────────────────────────────────────────────────────────────

async function loadSummary() {
  const d = await apiFetch('/api/summary');
  if (!d) return;

  document.getElementById('s-pct').innerHTML = d.overall_pct + '<span>%</span>';
  document.getElementById('s-games').textContent = d.total_games;
  document.getElementById('s-earned').textContent = d.total_earned.toLocaleString();
  document.getElementById('s-total').textContent = d.total_possible.toLocaleString();
  document.getElementById('s-perfect').textContent = d.perfect_games || 0;

  const pg = document.getElementById('platformsGrid');
  if (!d.by_platform.length) {
    pg.innerHTML = '<div class="empty-state" style="width:100%">No record yet. Run a sync to pull your history.</div>';
    return;
  }
  pg.innerHTML = d.by_platform.map(p => `
    <div class="platform-card">
      <div class="p-name">${platLabel(p.platform)}</div>
      <div class="p-stats">
        <div class="p-stat"><div class="val">${p.games}</div><div class="lbl">Games</div></div>
        <div class="p-stat"><div class="val">${(p.earned||0).toLocaleString()}</div><div class="lbl">Unlocked</div></div>
        <div class="p-stat"><div class="val">${p.pct}%</div><div class="lbl">Complete</div></div>
      </div>
      <div class="p-bar"><div class="fill" style="width:${p.pct}%"></div></div>
    </div>`).join('');
}

// ── Games ─────────────────────────────────────────────────────────────────────

async function loadGames(page = 1) {
  const sort = currentSort;
  const search = document.getElementById('searchInput').value.trim();
  const platform = document.getElementById('platFilter').value;

  let url = `/api/games?sort=${sort}&page=${page}&page_size=20`;
  if (platform) url += `&platform=${encodeURIComponent(platform)}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  const data = await apiFetch(url);
  if (!data) return;

  document.getElementById('libCount').textContent = data.total + ' games';
  renderGames(data.games);
  renderPagination(data.total, page, 20);
}

function renderGames(games) {
  const grid = document.getElementById('gameGrid');
  if (!games.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No record yet. Run a sync to pull your history.</div>';
    return;
  }
  grid.innerHTML = games.map(g => gameCardHTML(g)).join('');
}

function gameCardHTML(g) {
  const pct = parseFloat(g.completion_pct) || 0;
  const full = pct >= 100;
  const bg = g.icon_url ? `style="background-image:url('${g.icon_url}')"` : '';
  const icon = g.icon_url
    ? `<img class="game-icon" src="${g.icon_url}" alt="" onerror="this.style.display='none'">`
    : `<div class="game-icon-placeholder">◈</div>`;

  return `
<div class="game-card" id="card-${g.platform_game_id}" onclick="toggleAch(${g.platform_game_id}, this)">
  <div class="game-card-bg" ${bg}></div>
  <div class="game-card-body">
    ${icon}
    <div class="game-info">
      <div class="game-name" title="${esc(g.name)}">${esc(g.name)}</div>
      <div class="game-meta">
        <span><span class="ico">◈</span>${g.earned_achievements} / ${g.total_achievements}</span>
        <span><span class="ico">◷</span>${fmtTime(g.playtime_minutes)}</span>
        <span><span class="ico">◻</span>${fmt(g.last_played_at)}</span>
      </div>
      <div class="pct-track"><div class="pct-fill ${full?'full':''}" style="width:${pct}%"></div></div>
      <div class="game-footer">
        <span class="pct-val ${full?'full':''}">${pct}%</span>
        <span class="plat-tag">${platLabel(g.platform)}</span>
      </div>
    </div>
  </div>
  <div class="ach-panel" id="ach-${g.platform_game_id}">
    <div class="ach-loading">Loading achievements…</div>
  </div>
</div>`;
}

async function toggleAch(id, card) {
  const panel = document.getElementById('ach-' + id);
  const expanded = card.classList.toggle('expanded');
  if (!expanded) return;

  if (achCache[id]) { panel.innerHTML = achCache[id]; return; }

  const achs = await apiFetch(`/api/games/${id}/achievements`);
  if (!achs) { panel.innerHTML = '<div class="ach-loading">Failed to load.</div>'; return; }

  const html = achs.length
    ? `<div class="ach-list">${achs.map(achRowHTML).join('')}</div>`
    : `<div class="ach-loading">No achievement data available.</div>`;
  achCache[id] = html;
  panel.innerHTML = html;
}

function achRowHTML(a) {
  const icon = a.icon_url
    ? `<img class="ach-icon" src="${a.icon_url}" alt="" onerror="this.style.display='none'">`
    : `<div class="ach-icon-ph">◈</div>`;
  const rarity = a.rarity_pct != null ? `<div class="ach-rarity">${parseFloat(a.rarity_pct).toFixed(1)}% global</div>` : '';
  const date = a.unlocked_at ? `<div class="ach-date">${fmt(a.unlocked_at)}</div>` : '';
  return `
<div class="ach-row ${a.unlocked ? '' : 'locked'}">
  ${icon}
  <div class="ach-text">
    <div class="ach-name">${esc(a.name || a.platform_ach_id)}</div>
    <div class="ach-desc">${esc(a.description || '')}</div>
  </div>
  <div class="ach-right">${date}${rarity}</div>
</div>`;
}

function renderPagination(total, page, size) {
  const pages = Math.ceil(total / size);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let h = `<button onclick="loadGames(${page-1})" ${page===1?'disabled':''}>←</button>`;
  const s = Math.max(1, page-2), e = Math.min(pages, page+2);
  for (let p = s; p <= e; p++)
    h += `<button class="${p===page?'active':''}" onclick="loadGames(${p})">${p}</button>`;
  h += `<button onclick="loadGames(${page+1})" ${page===pages?'disabled':''}>→</button>`;
  el.innerHTML = h;
}

// ── Sort / search ─────────────────────────────────────────────────────────────

function setSort(btn) {
  document.querySelectorAll('.sort-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  loadGames(1);
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadGames(1), 300);
}

// ── Sync ──────────────────────────────────────────────────────────────────────

async function triggerSync() {
  const btn = document.getElementById('syncBtn');
  const lbl = document.getElementById('syncLabel');
  btn.disabled = true;
  lbl.textContent = 'Syncing…';
  try {
    const r = await fetch('/api/sync', { method: 'POST' });
    if (r.status === 409) { lbl.textContent = 'Already syncing'; }
    else { lbl.textContent = 'Sync started'; }
  } catch(_) { lbl.textContent = 'Error'; }
  setTimeout(() => { btn.disabled = false; lbl.textContent = 'Ready'; }, 4000);
}

// ── Util ──────────────────────────────────────────────────────────────────────

async function apiFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(_) { return null; }
}

function fmt(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function fmtTime(m) {
  if (!m) return '—';
  if (m < 60) return m + 'm';
  const h = Math.floor(m/60), r = m%60;
  return r ? `${h}h ${r}m` : `${h}h`;
}

function platLabel(p) {
  if (p === 'steam') return 'Steam';
  if (p === 'retroachievements') return 'RetroAchievements';
  return p;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
