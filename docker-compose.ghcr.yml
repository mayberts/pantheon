# Tier 2 deploy: pull a prebuilt image from GHCR instead of building on the box.
# Replace <youruser> with your lowercase GitHub username/org.
# First run on the host (once), to allow pulling a private package:
#   echo <PAT_with_read:packages> | docker login ghcr.io -u <youruser> --password-stdin
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pantheon
      POSTGRES_PASSWORD: pantheon
      POSTGRES_DB: pantheon
    volumes:
      - /mnt/user/appdata/pantheon/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantheon"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ghcr.io/mayberts/pantheon:latest
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://pantheon:pantheon@db:5432/pantheon
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_ID: ${STEAM_ID}
      RA_USERNAME: ${RA_USERNAME:-}
      RA_API_KEY: ${RA_API_KEY:-}
      RA_TARGET_USER: ${RA_TARGET_USER:-}
      XBOX_CLIENT_ID: ${XBOX_CLIENT_ID:-}
      XBOX_REDIRECT_URI: ${XBOX_REDIRECT_URI:-}
      XBOX_REFRESH_TOKEN: ${XBOX_REFRESH_TOKEN:-}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-12}
      REQUEST_DELAY_SECONDS: ${REQUEST_DELAY_SECONDS:-0.4}
    volumes:
      - /mnt/user/appdata/pantheon/data:/data
    ports:
      - "8744:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
